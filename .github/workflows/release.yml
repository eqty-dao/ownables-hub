name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://ownables:ownables@127.0.0.1:5432/ownables_hub_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ownables_hub_test
          POSTGRES_USER: ownables
          POSTGRES_PASSWORD: ownables
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ownables -d ownables_hub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint:check

      - name: Core compatibility smoke
        run: yarn verify:core-compat

      - name: Replay boundary verifier
        run: yarn verify:hub-replay-boundary

      - name: Unit tests
        run: yarn test --runInBand

      - name: Build
        run: yarn build

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn release
